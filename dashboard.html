<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BrainBloom Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
html, body {
width:100%;
}
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Inter',sans-serif;
}

body{
  height:100vh;
  display:flex;
  background: linear-gradient(135deg,#7111e6,#6a2799);
}

.ai-panel{
  position:absolute;
  right:40px;
  top:50%;
  transform:translateY(-50%);
  width:200px;
}

#orb{
  width:120px;
  height:120px;
  border-radius:50%;
  background: radial-gradient(circle at 30% 30%, #a78bfa, #6d28d9);
  box-shadow: 0 0 40px rgba(124,58,237,0.7);
  transition:0.2s;
}

/* dynamic talking effect */
#orb.speaking{
  animation: talk 0.3s infinite;
}

@keyframes talk{
  0%{ transform: scale(1); }
  50%{ transform: scale(1.15); }
  100%{ transform: scale(1); }
}

/* AI TEXT */
#aiText{
  text-align:center;
  color:white;
  font-size:14px;
  background:rgba(255,255,255,0.1);
  padding:10px;
  border-radius:12px;
  max-height:120px;
  overflow:auto;
}

/* SIDEBAR */
.sidebar{
  width:250px;
  min-width:70px;
  background: rgba(0,0,0,0.25);
  backdrop-filter: blur(20px);
  padding:20px 10px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  align-items:center;
  transition:0.3s;
  border-right:1px solid rgba(255,255,255,0.1);
}

.sidebar.collapsed{
  width:80px;
}

.menu-toggle{
  font-size:22px;
  cursor:pointer;
  margin-bottom:20px;
  color:white;
}

.sidebar h2{
  color:white;
  margin-bottom:20px;
  text-align:center;
}

/* MENU */
.menu{
  display:flex;
  flex-direction:column;
  align-items:center;
  width:100%;
}

.btn{
  width:85%;
  padding:12px;
  margin-bottom:12px;
  border:none;
  border-radius:25px;
  cursor:pointer;
  background: linear-gradient(135deg,#7c3aed,#5b21b6);
  color:white;
  font-weight:500;
  transition:0.3s;
}

.btn:hover{
  transform:translateY(-2px) scale(1.03);
  background: linear-gradient(135deg,#6d28d9,#4c1d95);
  box-shadow:0 0 15px rgba(124,58,237,0.6);
}

/* PROFILE BUTTON */
.profile-btn{
  width:60px;
  height:60px;
  border-radius:50%;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:22px;
  background: linear-gradient(135deg,#7c3aed,#5b21b6);
  color:white;
  border:none;
  cursor:pointer;
}

/* MAIN */
.main{
  flex:1;
  display:flex;
  flex-direction:column;
  position:relative;
  width:100%;
}
/* CHAT */
.chat-box{
  flex:1;
  padding:20px;
  overflow-y:auto;
}

.message{
  max-width:60%;
  padding:12px;
  margin:10px 0;
  border-radius:15px;
}

.user{
  background:#7c3aed;
  color:white;
  margin-left:auto;
}

.ai{
  background:rgba(255,255,255,0.15);
  color:white;
}

/* INPUT */
.input-area{
  position:absolute;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  width:60%;
  max-width:800px;
  display:flex;
  padding:12px;
  border-radius:20px;
  background: rgba(0,0,0,0.3);
}

.input-area input{
  flex:1;
  padding:12px;
  border:none;
  border-radius:12px;
  background:transparent;
  color:white;
  outline:none;
}

.input-area button{
  margin-left:10px;
  padding:10px 15px;
  border:none;
  border-radius:12px;
  background: linear-gradient(135deg,#7c3aed,#5b21b6);
  color:white;
  cursor:pointer;
}
</style>

<script>
// 🔐 PROTECT PAGE
const token = localStorage.getItem("token");

if (!token) {
  alert("Please index first");
  window.location.href = "index.html";
}
</script>
</head>

<body>

<script>
speechSynthesis.onvoiceschanged = () => {};
let recognition;

function startListening() {
  recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();

  recognition.lang = "en-US";
  recognition.interimResults = false;

  recognition.onstart = () => {
    console.log("Listening...");
    document.getElementById("orb").classList.add("speaking");
  };

  recognition.onresult = (event) => {
    const transcript = event.results[0][0].transcript;
    document.getElementById("userInput").value = transcript;

    sendMessage(); // auto send
  };

  recognition.onend = () => {
    document.getElementById("orb").classList.remove("speaking");
  };

  recognition.start();
}

function speakText(text) {
  const speech = new SpeechSynthesisUtterance(text);

  const voices = speechSynthesis.getVoices();

  // 🔥 TRY TO FORCE FEMALE VOICE
  let femaleVoice =
    voices.find(v => v.name.includes("Google UK English Female")) ||
    voices.find(v => v.name.includes("Female")) ||
    voices.find(v => v.name.includes("Samantha")) ||
    voices[0];

  speech.voice = femaleVoice;

  speech.rate = 1;
  speech.pitch = 1.3; // makes it sound more feminine

  const orb = document.getElementById("orb");

  speech.onstart = () => orb.classList.add("speaking");
  speech.onend = () => orb.classList.remove("speaking");

  speechSynthesis.speak(speech);
}
  
function toggleSidebar(){
  document.getElementById('sidebar').classList.toggle('collapsed');
}

function newChat(){
  document.getElementById('chatBox').innerHTML='';
}

// ENTER KEY SUPPORT
document.getElementById("userInput").addEventListener("keypress", function(e){
  if(e.key === "Enter"){
    sendMessage();
  }
});

async function sendMessage(){
  const input = document.getElementById('userInput');
  const chatBox = document.getElementById('chatBox');

  if(input.value.trim() === '') return;

  // 👤 USER MESSAGE
  const userMsg = document.createElement('div');
  userMsg.className = 'message user';
  userMsg.innerText = input.value;
  chatBox.appendChild(userMsg);

  const message = input.value;
  input.value = '';

  try {
    // 🤖 API CALL
    const res = await fetch("https://backend-production-bc2c.up.railway.app/api/chat", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ message })
    });

    const data = await res.json();
    const aiText = data.reply;

    // 💬 CHAT BOX MESSAGE
    const aiMsg = document.createElement('div');
    aiMsg.className = 'message ai';
    aiMsg.innerText = aiText;
    chatBox.appendChild(aiMsg);

    // 🔮 SIDE PANEL TEXT
    document.getElementById("aiText").innerText = aiText;

    // 🔊 SPEECH FUNCTION
    speakText(aiText);

    chatBox.scrollTop = chatBox.scrollHeight;

  } catch (err) {
    console.error(err);

    const errorMsg = document.createElement('div');
    errorMsg.className = 'message ai';
    errorMsg.innerText = "⚠️ AI not responding";
    chatBox.appendChild(errorMsg);
  }
}

</script>
<div class="sidebar" id="sidebar">
  <div>
    <div class="menu-toggle" onclick="toggleSidebar()"> ☰ </div>
    <h2>Brain Bloom</h2>

    <div class="menu">
      <button class="btn" onclick="newChat()">📌 New Chat</button>
      <button class="btn">📜 History</button>
    </div>
  </div>

  <div>
    <button class="profile-btn">👤</button>
  </div>
</div>

<div class="main">
  <div class="ai-panel">
    <div id="orb"></div>
    <div id="aiText"></div>
  </div>
  <div class="chat-box" id="chatBox"></div>
  
  <div class="input-area">
    <input type="text" id="userInput" placeholder="Ask something...">
    <button onclick="sendMessage()">Send</button>
    <button onclick="startListening()">🎤</button>
  </div>
</div>

</body>
</html>
